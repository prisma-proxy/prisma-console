name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

env:
  NODE_VERSION: "22"

jobs:
  build:
    name: Build Console
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
      - run: npm ci
      - run: npm run build
      - name: Package static export
        run: tar -czf prisma-console.tar.gz -C out .
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: prisma-console.tar.gz
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
